  <title>Play jQuery 3 | Dynamic Table</title>

  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/styles.css">

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <script>
    function clicked() {
      alert("I was clicked");
    }

    // Step 4: Logic to generate and append user rows to the table
    function displayUsers() {
      function User(firstName, lastName, age) {
        this.firstName = firstName;
        this.lastName = lastName;
        this.age = age;
      }

      var users = [];
      users.push(
        new User("John", "Lennon", 80),
        new User("Paul", "McCartney", 78),
        new User("George", "Harrison", 53),
        new User("Ringo", "Starr", 80)
      );

      var x = 0;

      for (var i = 0; i < users.length; i++) {
        var user = users[i];
        var rowStyle = x % 2 === 0 ? "#FFFFFF" : "#F0F0F0";

        var markup =
          "<tr>" +
            "<td>" + user.firstName + "</td>" +
            "<td>" + user.lastName + "</td>" +
            "<td>" + user.age + "</td>" +
          "</tr>";

        // Step 5: Append markup to the table body using jQuery find and append
        $("#users").find("tbody").append(markup);

        var lastRow = $("#users").find("tbody").find("tr").last();
        lastRow.attr("id", x);
        lastRow.css("background-color", rowStyle);

        $(lastRow.find("td").get(0)).attr("id", x + "-1");
        $(lastRow.find("td").get(1)).attr("id", x + "-2");
        $(lastRow.find("td").get(2)).attr("id", x + "-3");

        x++;
      }
    }

    // Initialize display function once DOM is ready
    $(document).ready(displayUsers);
  </script>
</head>
