<div class="container mt-4 text-center">
  <h1>Contact a Professor</h1>

  <!-- ✅ REQUIRED: POST form to postman-echo -->
  <form method="POST" action="https://postman-echo.com/post" class="mt-4">

    <div class="form-group row">
      <label for="professor" class="col-sm-2 col-form-label">Professor</label>
      <div class="col-sm-10">
        <input type="text" class="form-control" id="professor" name="professor" placeholder="Professor name" />
      </div>
    </div>

    <div class="form-group row">
      <label for="college" class="col-sm-2 col-form-label">College</label>
      <div class="col-sm-10">
        <input type="text" class="form-control" id="college" name="college" placeholder="College name" />
      </div>
    </div>

    <div class="form-group row">
      <label for="course" class="col-sm-2 col-form-label">Course</label>
      <div class="col-sm-10">
        <select class="form-control" id="course" name="course">
          <option>CST-105: Computer Programming I</option>
          <option selected>CST-120: Web Development</option>
          <option>CST-150: Programming in C++</option>
          <option>CST-221: Operating Systems Concepts</option>
          <option>CST-239: Programming in Java</option>
          <option>CST-250: Programming in C#</option>
          <option>CST-323: Cloud Computing</option>
        </select>
      </div>
    </div>

    <div class="form-group row">
      <label for="message" class="col-sm-2 col-form-label">Message</label>
      <div class="col-sm-10">
        <textarea class="form-control" id="message" name="message" rows="3"
                  placeholder="Type your message..."></textarea>
      </div>
    </div>

    <div class="form-group row">
      <div class="col-sm-12">
        <button type="submit" class="btn btn-primary">Send</button>
      </div>
    </div>

  </form>

  <a href="index.html" class="d-block mt-3">Back to Main Page</a>
